name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect version bump
        id: detect
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [[ -z "${current_version}" ]]; then
            echo "Could not determine current Cargo version." >&2
            exit 1
          fi

          should_release="false"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            should_release="true"
          else
            before_sha="${{ github.event.before }}"
            if [[ -z "${before_sha}" || "${before_sha}" =~ ^0+$ ]]; then
              should_release="true"
            elif git cat-file -e "${before_sha}:Cargo.toml" 2>/dev/null; then
              previous_version="$(git show "${before_sha}:Cargo.toml" | \
                sed -n 's/^version = "\([^"]*\)"/\1/p' | head -n 1)"
              if [[ "${current_version}" != "${previous_version}" ]]; then
                should_release="true"
              fi
            else
              should_release="true"
            fi
          fi

          tag="v${current_version}"
          tag_exists="false"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            tag_exists="true"
          fi

          release_exists="false"
          release_complete="false"
          if gh release view "${tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets \
            --jq '.assets[].name' > /tmp/release-assets.txt 2>/dev/null; then
            release_exists="true"
            release_complete="true"
            for asset in \
              "knots-v${current_version}-windows-x86_64.zip" \
              "knots-v${current_version}-checksums.txt"; do
              if ! grep -Fxq "${asset}" /tmp/release-assets.txt; then
                release_complete="false"
                break
              fi
            done
          fi

          if [[ "${should_release}" == "true" ]]; then
            if [[ "${release_complete}" == "true" ]]; then
              echo "::notice::Release ${tag} already exists with expected assets. Skipping publish."
              should_release="false"
            elif [[ "${release_exists}" == "true" ]]; then
              echo "::notice::Release ${tag} is missing expected assets."
              echo "::notice::Continuing in recovery mode."
            elif [[ "${tag_exists}" == "true" ]]; then
              echo "::error::Tag ${tag} exists, but no GitHub release was found."
              echo "::error::Inspect the existing tag before retrying."
              exit 1
            fi
          fi

          echo "should_release=${should_release}" >> "${GITHUB_OUTPUT}"
          echo "version=${current_version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  # This fork ports Knots to Windows; upstream (acartine/knots) ships the
  # macOS and Linux artifacts. The release therefore builds only the Windows
  # x86_64 target.
  build-windows:
    runs-on: windows-latest
    needs: detect-release
    if: needs.detect-release.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Windows binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ needs.detect-release.outputs.version }}'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\knots.exe dist\knots.exe
          Compress-Archive -Path dist\knots.exe -DestinationPath "knots-v$version-windows-x86_64.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: knots-v${{ needs.detect-release.outputs.version }}-windows-x86_64.zip

  publish-release:
    runs-on: ubuntu-latest
    needs: [detect-release, build-windows]
    if: needs.detect-release.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Windows artifact
        uses: actions/download-artifact@v7
        with:
          name: release-windows
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.detect-release.outputs.version }}"
          cd dist
          sha256sum knots-v"${version}"-windows-x86_64.zip \
            > knots-v"${version}"-checksums.txt

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          scripts/release/notes-from-changelog.sh \
            "${{ needs.detect-release.outputs.version }}" \
            CHANGELOG.md \
            > dist/release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.detect-release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.detect-release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --notes-file dist/release-notes.md
            gh release upload "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber \
              "dist/knots-v${RELEASE_VERSION}-windows-x86_64.zip" \
              "dist/knots-v${RELEASE_VERSION}-checksums.txt"
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_TAG}" \
              --notes-file dist/release-notes.md \
              "dist/knots-v${RELEASE_VERSION}-windows-x86_64.zip" \
              "dist/knots-v${RELEASE_VERSION}-checksums.txt"
          fi
